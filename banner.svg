<svg width="460" height="300" viewBox="0 0 460 300" xmlns="http://www.w3.org/2000/svg">
<title>Harshet Jain — infrastructure network</title>
<defs>
  <style>
    .node { fill: #C4873A; }
    .node-dim { fill: #3D2E1A; }
    .edge { stroke: #C4873A; stroke-width: 0.8; fill: none; opacity: 0.25; }

    /* Nodes pulse in/out with staggered delays */
    .n1  { animation: pulse 4s 0.0s ease-in-out infinite alternate; }
    .n2  { animation: pulse 4s 0.3s ease-in-out infinite alternate; }
    .n3  { animation: pulse 4s 0.7s ease-in-out infinite alternate; }
    .n4  { animation: pulse 4s 1.1s ease-in-out infinite alternate; }
    .n5  { animation: pulse 4s 1.5s ease-in-out infinite alternate; }
    .n6  { animation: pulse 4s 1.9s ease-in-out infinite alternate; }
    .n7  { animation: pulse 4s 2.3s ease-in-out infinite alternate; }
    .n8  { animation: pulse 4s 2.7s ease-in-out infinite alternate; }
    .n9  { animation: pulse 4s 0.5s ease-in-out infinite alternate; }
    .n10 { animation: pulse 4s 1.3s ease-in-out infinite alternate; }
    .n11 { animation: pulse 4s 2.1s ease-in-out infinite alternate; }
    .n12 { animation: pulse 4s 3.1s ease-in-out infinite alternate; }

    /* Edges animate opacity */
    .e1  { animation: edgepulse 5s 0.2s ease-in-out infinite alternate; }
    .e2  { animation: edgepulse 5s 0.8s ease-in-out infinite alternate; }
    .e3  { animation: edgepulse 5s 1.4s ease-in-out infinite alternate; }
    .e4  { animation: edgepulse 5s 2.0s ease-in-out infinite alternate; }
    .e5  { animation: edgepulse 5s 2.6s ease-in-out infinite alternate; }
    .e6  { animation: edgepulse 5s 3.2s ease-in-out infinite alternate; }
    .e7  { animation: edgepulse 5s 0.5s ease-in-out infinite alternate; }
    .e8  { animation: edgepulse 5s 1.1s ease-in-out infinite alternate; }
    .e9  { animation: edgepulse 5s 1.7s ease-in-out infinite alternate; }
    .e10 { animation: edgepulse 5s 2.3s ease-in-out infinite alternate; }
    .e11 { animation: edgepulse 5s 2.9s ease-in-out infinite alternate; }
    .e12 { animation: edgepulse 5s 3.5s ease-in-out infinite alternate; }
    .e13 { animation: edgepulse 5s 0.9s ease-in-out infinite alternate; }
    .e14 { animation: edgepulse 5s 1.6s ease-in-out infinite alternate; }

    /* Traveling data packets along edges */
    .p1 { animation: travel1 3s 0.0s linear infinite; }
    .p2 { animation: travel2 3.5s 0.7s linear infinite; }
    .p3 { animation: travel3 4s 1.4s linear infinite; }
    .p4 { animation: travel4 3.2s 2.1s linear infinite; }
    .p5 { animation: travel5 4.5s 0.3s linear infinite; }
    .p6 { animation: travel6 3.8s 1.8s linear infinite; }

    @keyframes pulse {
      0%   { opacity: 0.2; r: 2.5; }
      100% { opacity: 1;   r: 4.5; }
    }

    @keyframes edgepulse {
      0%   { opacity: 0.05; }
      100% { opacity: 0.4;  }
    }

    /* Packet traveling paths */
    @keyframes travel1 {
      0%   { cx: 60;  cy: 80;  opacity: 0; }
      5%   { opacity: 1; }
      95%  { opacity: 1; }
      100% { cx: 200; cy: 50;  opacity: 0; }
    }
    @keyframes travel2 {
      0%   { cx: 200; cy: 50;  opacity: 0; }
      5%   { opacity: 1; }
      95%  { opacity: 1; }
      100% { cx: 340; cy: 90;  opacity: 0; }
    }
    @keyframes travel3 {
      0%   { cx: 130; cy: 180; opacity: 0; }
      5%   { opacity: 1; }
      95%  { opacity: 1; }
      100% { cx: 260; cy: 160; opacity: 0; }
    }
    @keyframes travel4 {
      0%   { cx: 60;  cy: 80;  opacity: 0; }
      5%   { opacity: 1; }
      95%  { opacity: 1; }
      100% { cx: 130; cy: 180; opacity: 0; }
    }
    @keyframes travel5 {
      0%   { cx: 340; cy: 90;  opacity: 0; }
      5%   { opacity: 1; }
      95%  { opacity: 1; }
      100% { cx: 400; cy: 200; opacity: 0; }
    }
    @keyframes travel6 {
      0%   { cx: 260; cy: 160; opacity: 0; }
      5%   { opacity: 1; }
      95%  { opacity: 1; }
      100% { cx: 340; cy: 240; opacity: 0; }
    }
  </style>

  <!-- Radial glow for center -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#C4873A" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#141414" stop-opacity="0"/>
  </radialGradient>
</defs>

<!-- Background -->
<rect width="460" height="300" fill="#0F0F0F" rx="12"/>

<!-- Ambient glow -->
<ellipse cx="230" cy="150" rx="200" ry="130" fill="url(#glow)"/>

<!-- ── EDGES (connections between nodes) ── -->
<line class="edge e1"  x1="60"  y1="80"  x2="200" y2="50"/>
<line class="edge e2"  x1="200" y1="50"  x2="340" y2="90"/>
<line class="edge e3"  x1="60"  y1="80"  x2="130" y2="180"/>
<line class="edge e4"  x1="200" y1="50"  x2="260" y2="160"/>
<line class="edge e5"  x1="340" y1="90"  x2="400" y2="200"/>
<line class="edge e6"  x1="130" y1="180" x2="260" y2="160"/>
<line class="edge e7"  x1="260" y1="160" x2="340" y2="240"/>
<line class="edge e8"  x1="340" y1="90"  x2="260" y2="160"/>
<line class="edge e9"  x1="130" y1="180" x2="60"  y2="240"/>
<line class="edge e10" x1="260" y1="160" x2="400" y2="200"/>
<line class="edge e11" x1="60"  y1="240" x2="130" y2="180"/>
<line class="edge e12" x1="340" y1="240" x2="400" y2="200"/>
<line class="edge e13" x1="200" y1="50"  x2="130" y2="180"/>
<line class="edge e14" x1="60"  y1="80"  x2="40"  y2="160"/>

<!-- ── NODES ── -->
<!-- Main nodes — amber -->
<circle class="node n1"  cx="60"  cy="80"  r="4"/>
<circle class="node n2"  cx="200" cy="50"  r="5"/>
<circle class="node n3"  cx="340" cy="90"  r="4"/>
<circle class="node n4"  cx="130" cy="180" r="4.5"/>
<circle class="node n5"  cx="260" cy="160" r="5.5"/>
<circle class="node n6"  cx="400" cy="200" r="3.5"/>
<circle class="node n7"  cx="60"  cy="240" r="3"/>
<circle class="node n8"  cx="340" cy="240" r="4"/>

<!-- Secondary nodes — smaller, dimmer -->
<circle class="node-dim n9"  cx="40"  cy="160" r="2.5" style="animation:pulse 4s 0.5s ease-in-out infinite alternate; fill:#5A3F1F;"/>
<circle class="node-dim n10" cx="160" cy="110" r="2"   style="animation:pulse 4s 1.3s ease-in-out infinite alternate; fill:#5A3F1F;"/>
<circle class="node-dim n11" cx="310" cy="200" r="2.5" style="animation:pulse 4s 2.1s ease-in-out infinite alternate; fill:#5A3F1F;"/>
<circle class="node-dim n12" cx="420" cy="130" r="2"   style="animation:pulse 4s 3.1s ease-in-out infinite alternate; fill:#5A3F1F;"/>

<!-- ── TRAVELING DATA PACKETS ── -->
<circle class="p1" r="2" fill="#C4873A" opacity="0"/>
<circle class="p2" r="2" fill="#C4873A" opacity="0"/>
<circle class="p3" r="1.5" fill="#E8B06A" opacity="0"/>
<circle class="p4" r="1.5" fill="#C4873A" opacity="0"/>
<circle class="p5" r="2" fill="#E8B06A" opacity="0"/>
<circle class="p6" r="1.5" fill="#C4873A" opacity="0"/>

<!-- ── CENTRAL NODE — brightest, largest, the "hub" ── -->
<!-- Outer ring -->
<circle cx="230" cy="150" r="12" fill="none" stroke="#C4873A" stroke-width="0.5" opacity="0.15"
  style="animation: pulse 3s 0s ease-in-out infinite alternate"/>
<circle cx="230" cy="150" r="7"  fill="none" stroke="#C4873A" stroke-width="0.8" opacity="0.3"
  style="animation: pulse 3s 0.5s ease-in-out infinite alternate"/>
<circle cx="230" cy="150" r="3.5" fill="#C4873A"
  style="animation: pulse 3s 1s ease-in-out infinite alternate"/>

<!-- Edges to center -->
<line class="edge" x1="200" y1="50"  x2="230" y2="150" style="animation:edgepulse 3s 0.0s ease-in-out infinite alternate"/>
<line class="edge" x1="130" y1="180" x2="230" y2="150" style="animation:edgepulse 3s 0.6s ease-in-out infinite alternate"/>
<line class="edge" x1="340" y1="90"  x2="230" y2="150" style="animation:edgepulse 3s 1.2s ease-in-out infinite alternate"/>
<line class="edge" x1="260" y1="160" x2="230" y2="150" style="animation:edgepulse 3s 1.8s ease-in-out infinite alternate"/>

</svg>
